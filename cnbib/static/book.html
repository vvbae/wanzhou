<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>版本详情</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --accent:#c0392b; }
  body { margin:0; font:16px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  a { color:#2c5b8f; text-decoration:none; }
  .nav { font-size:14px; margin-bottom:12px; }
  .top { display:flex; gap:14px; }
  .top img { width:96px; height:136px; object-fit:cover; border-radius:8px; background:#eee; flex:none; }
  .top .ph { width:96px; height:136px; flex:none; display:flex; align-items:center; justify-content:center; background:#ececea; color:#9a9a93; font-size:13px; border-radius:8px; }
  .gc .ph { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; background:#ececea; color:#9a9a93; font-size:12px; border-radius:8px; }
  h1 { font-size:20px; margin:0 0 4px; }
  table { width:100%; border-collapse:collapse; margin-top:16px; background:var(--card); border:1px solid var(--line); border-radius:11px; overflow:hidden; }
  td { padding:9px 11px; border-top:1px solid var(--line); vertical-align:top; }
  tr:first-child td { border-top:0; }
  td.k { color:var(--sub); width:84px; font-size:14px; white-space:nowrap; }
  td.v { font-size:15px; word-break:break-word; }
  .src { display:inline-block; font-size:11px; border-radius:6px; padding:1px 7px; margin-left:6px; color:#fff; }
  .src.crowdsource { background:#2e7d32; } .src.openlibrary { background:#2c5b8f; } .src.google_books { background:#b5651d; }
  .miss { color:#b9b9b3; }
  .work { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px; margin-top:16px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .gc { color:var(--ink); } .gc img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; background:#e7e7e3; display:block; }
  .gc .t { font-size:12px; margin-top:5px; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .gc .cm { font-size:11px; color:var(--sub); }
  .err { color:var(--accent); padding:24px 0; text-align:center; }
</style>
</head>
<body>
  <div class="nav"><a href="/">← 搜索</a></div>
  <div id="app"></div>
<script>
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const EDFIELDS = [["isbn_10","ISBN-10"],["publisher","出版社"],["publish_date","出版日期"],
  ["publish_year","出版年"],["translators","译者"],["page_count","页数"],["language","语言"],
  ["series","丛书"],["format","装帧"],["subtitle","副书名"]];
const SRC = {crowdsource:"人工", openlibrary:"OpenLibrary", google_books:"Google"};

function val(e,k){ let v=e[k]; if(Array.isArray(v)) return v.join("、"); return (v==null||v==="")?null:String(v); }

function render(e){
  const w = e.work || {};
  const title = e.title || w.display_title || w.title || "(无标题)";
  const others = (w.editions||[]).filter(o => o.isbn_13 !== e.isbn_13);
  const cover = e.cover_url ? `<img src="${e.cover_url}" onerror="this.style.visibility='hidden'">` : `<div class="ph">暂无封面</div>`;
  const rows = EDFIELDS.map(([k,label])=>{
    const v = val(e,k); const src = e.sources && e.sources[k];
    const badge = src?`<span class="src ${src}">${SRC[src]||src}</span>`:"";
    return `<tr><td class="k">${label}</td><td class="v">${v==null?'<span class="miss">—</span>':esc(v)+badge}</td></tr>`;
  }).join("");
  const authors = (w.authors||[]).map(a=>`<a href="/author?id=${encodeURIComponent(a.id)}">${esc(a.name)}</a>`).join("、");
  document.getElementById("app").innerHTML = `
    <div class="top">${cover}
      <div><h1>${esc(title)}</h1>
        <div style="color:var(--sub);font-size:13px">ISBN ${e.isbn_13}</div>
        <div style="font-size:14px;margin-top:6px">作者：${authors||"—"}</div>
      </div>
    </div>
    <table>${rows}</table>
    ${w.description?`<div class="work">${esc(w.description)}</div>`:""}
    ${e.last_edit?`<p style="color:var(--sub);font-size:13px;margin-top:12px">最后由 ${esc(e.last_edit.by)} 编辑 · ${e.last_edit.at}</p>`:""}
    <p style="margin-top:14px"><a href="/edit?type=edition&isbn=${encodeURIComponent(e.isbn_13)}">✏️ 补全 / 纠错这一版</a>
      ${w.id?` · <a href="/work?id=${encodeURIComponent(w.id)}">作品页</a>`:""}</p>
    ${others.length?`<h2 style="font-size:15px;color:var(--sub);margin:20px 0 6px">其他版本（${others.length}）</h2>
      <div class="grid">${others.map(o=>{
        const oc=o.cover_url?`<img src="${o.cover_url}" loading="lazy" onerror="this.style.visibility='hidden'">`:`<div class="ph">暂无封面</div>`;
        const m=[o.publisher,o.publish_year].filter(Boolean).join(" · ");
        return `<a class="gc" href="/book?isbn=${encodeURIComponent(o.isbn_13)}">${oc}<div class="t">${esc(o.title||title)}</div><div class="cm">${esc(m)}</div></a>`;
      }).join("")}</div>`:""}`;
}
async function load(){
  const isbn = new URLSearchParams(location.search).get("isbn");
  if(!isbn){ document.getElementById("app").innerHTML='<div class="err">缺少 ISBN</div>'; return; }
  try{
    const r = await fetch("/books/"+encodeURIComponent(isbn));
    if(r.status===404){ document.getElementById("app").innerHTML=`<div class="err">库里没有这本。<br>
      <a href="/add?isbn=${encodeURIComponent(isbn)}" style="color:var(--accent)">➕ 加这本书 →</a></div>`; return; }
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    render(await r.json());
  }catch(e){ document.getElementById("app").innerHTML=`<div class="err">加载失败：${e.message}</div>`; }
}
load();
</script>
<script src="/static/chrome.js"></script>
</body>
</html>
