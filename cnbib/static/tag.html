<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>标签</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  a { color:inherit; text-decoration:none; } .nav{font-size:14px;margin-bottom:12px} .nav a{color:#2c5b8f}
  h1 { font-size:20px; }
  .hit { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 13px; margin-top:10px; }
  .hit .t { font-weight:600; } .hit .m { color:var(--sub); font-size:13px; }
  .meta { color:var(--sub); font-size:13px; margin:10px 2px; }
  .err { color:#c0392b; padding:24px 0; text-align:center; }
</style>
</head>
<body>
  <div class="nav"><a href="/">← 搜索</a></div>
  <div id="app"></div>
<script>
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function load(){
  const params = new URLSearchParams(location.search);
  const tag = params.get("tag"); const label = params.get("label");
  if(!tag){ document.getElementById("app").innerHTML='<div class="err">缺少标签</div>'; return; }
  try{
    const d = await (await fetch("/tag_works?"+new URLSearchParams({tag}))).json();
    const shown = label || d.name || tag;
    const list = d.results.map(w=>`<a href="/work?id=${encodeURIComponent(w.id)}"><div class="hit">
      <div class="t">${esc(w.title)||"(无标题)"}</div>
      <div class="m">${esc((w.authors||[]).join("、"))}${w.first_publish_year?(" · "+w.first_publish_year):""}</div></div></a>`).join("");
    document.getElementById("app").innerHTML =
      `<h1># ${esc(shown)}</h1><div class="meta">共 ${d.total} 本</div>`+ (list||'<div class="meta">—</div>');
  }catch(e){ document.getElementById("app").innerHTML=`<div class="err">加载失败：${e.message}</div>`; }
}
load();
</script>
</body>
</html>
