<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>加书</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --ok:#2e7d32; --accent:#c0392b; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:560px; margin:0 auto; }
  a { color:#2c5b8f; } .nav { font-size:14px; margin-bottom:12px; }
  h1 { font-size:19px; } .sub{color:var(--sub);font-size:13px;margin-top:-6px}
  label { display:block; font-size:13px; color:var(--sub); margin:12px 0 4px; }
  input,textarea { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:9px; font:inherit; }
  textarea{min-height:70px;resize:vertical}
  button { margin-top:16px; width:100%; padding:11px; border:0; border-radius:9px; background:var(--ink); color:#fff; font-weight:600; }
  .msg{padding:10px 12px;border-radius:9px;margin:12px 0;display:none}
  .msg.ok{background:#eaf4ea;color:var(--ok);display:block} .msg.err{background:#fbeceb;color:var(--accent);display:block}
</style>
</head>
<body>
  <div class="nav"><a href="/">← 搜索</a></div>
  <h1>加一本书</h1>
  <p class="sub">我们没有的书，填好提交，管理员审核后入库。带 * 必填。</p>
  <div id="msg" class="msg"></div>
  <form id="f">
    <label>ISBN *</label><input id="isbn_13" inputmode="numeric" placeholder="13 或 10 位">
    <label>书名（中文）*</label><input id="title">
    <label>作者（多个用逗号/顿号）</label><input id="authors">
    <label>译者</label><input id="translators">
    <label>原作名（译作）</label><input id="title_original">
    <label>出版社</label><input id="publisher">
    <label>出版年</label><input id="publish_year" inputmode="numeric">
    <label>简介</label><textarea id="description"></textarea>
    <label>主题/标签（逗号分隔）</label><input id="subjects">
    <button type="submit">提交（待审核）</button>
  </form>
<script>
const $=s=>document.querySelector(s);
const LIST=['authors','translators','subjects'];
function msg(t,ok){const m=$("#msg");m.textContent=t;m.className="msg "+(ok?"ok":"err");}
$("#f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const p={};
  for(const k of ['isbn_13','title','authors','translators','title_original','publisher','publish_year','description','subjects']){
    let v=$("#"+k).value.trim(); if(!v)continue;
    if(LIST.includes(k)) v=v.split(/[，,、;]+/).map(x=>x.trim()).filter(Boolean);
    if(k==='publish_year') v=parseInt(v)||undefined;
    p[k]=v;
  }
  if(!p.isbn_13||!p.title){msg("ISBN 和书名必填",false);return;}
  try{
    const r=await fetch("/contribute",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({target_type:"book",kind:"add",payload:p})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||r.statusText);
    msg("已提交，等管理员审核。谢谢你！",true); $("#f").reset();
  }catch(e){msg("提交失败："+e.message,false);}
});
</script>
</body>
</html>
