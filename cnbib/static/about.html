<h1>关于</h1>
<p>一个开放的中文书目数据库：按书名 / 作者查书，看一本作品的不同版本，看作者和他的作品。我们没有的书你能添加，信息不全或有错你能补全 / 纠错（经审核后入库）。</p>
<p>数据底子来自 <a href="https://openlibrary.org">OpenLibrary</a> 与 Google Books，中文部分由社区持续补全。</p>
<p><b>数据 CC0</b>（公共领域，随便用）；<b>代码开源</b>（MIT，<a href="https://github.com/vvbae/wanzhou">GitHub</a>）。</p>
