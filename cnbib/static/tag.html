<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>标签</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  a { color:inherit; text-decoration:none; } .nav{font-size:14px;margin-bottom:12px} .nav a{color:#2c5b8f}
  h1 { font-size:20px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:12px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .gc { color:var(--ink); min-width:0; } .gc img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; background:#e7e7e3; display:block; }
  .gc .t { font-size:12px; margin-top:5px; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .gc .ph { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; background:#ececea; color:#9a9a93; font-size:12px; border-radius:8px; }
  .pager { display:flex; justify-content:space-between; align-items:center; margin:18px 0; font-size:14px; color:var(--sub); }
  .meta { color:var(--sub); font-size:13px; margin:10px 2px; }
  .err { color:#c0392b; padding:24px 0; text-align:center; }
</style>
</head>
<body>
  <div class="nav"><a href="/">← 搜索</a></div>
  <div id="app"></div>
<script>
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function load(){
  const params = new URLSearchParams(location.search);
  const tag = params.get("tag"); const label = params.get("label");
  if(!tag){ document.getElementById("app").innerHTML='<div class="err">缺少标签</div>'; return; }
  try{
    const page = Math.max(1, parseInt(params.get("page"))||1);
    const size = 24;
    const d = await (await fetch("/tag_works?"+new URLSearchParams({tag, page, page_size:size}))).json();
    const shown = label || d.name || tag;
    const pages = Math.max(1, Math.ceil(d.total/size));
    const link = p => "/tag?"+new URLSearchParams(Object.assign({tag, page:p}, label?{label}:{}));
    const pager = pages>1 ? `<div class="pager">
      ${page>1?`<a href="${link(page-1)}">← 上一页</a>`:'<span></span>'}
      <span>第 ${page} / ${pages} 页</span>
      ${page<pages?`<a href="${link(page+1)}">下一页 →</a>`:'<span></span>'}</div>` : "";
    const cards = d.results.map(w=>{
      const c = w.cover_url?`<img src="${w.cover_url}" loading="lazy" onerror="this.style.visibility='hidden'">`:`<div class="ph">暂无封面</div>`;
      const href = w.isbn_13?("/book?isbn="+encodeURIComponent(w.isbn_13)):("/work?id="+encodeURIComponent(w.id));
      return `<a class="gc" href="${href}">${c}<div class="t">${esc(w.title)||"(无标题)"}</div></a>`;
    }).join("");
    document.getElementById("app").innerHTML =
      `<h1># ${esc(shown)}</h1><div class="meta">共 ${d.total} 本</div>`
      + (cards?`<div class="grid">${cards}</div>`:'<div class="meta">—</div>') + pager;
  }catch(e){ document.getElementById("app").innerHTML=`<div class="err">加载失败：${e.message}</div>`; }
}
load();
</script>
<script src="/static/chrome.js"></script>
</body>
</html>
