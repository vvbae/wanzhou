<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中文开放书目</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --accent:#c0392b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  h1 { font-size:20px; margin:6px 0 2px; }
  .sub { color:var(--sub); font-size:13px; margin:0 0 16px; }
  .row { display:flex; gap:8px; }
  input { font:inherit; width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:9px; }
  button { font:inherit; padding:11px 15px; border:0; border-radius:9px; background:var(--ink); color:#fff; font-weight:600; }
  button.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); }
  button:active { opacity:.7; }
  .bar { display:flex; gap:8px; margin-top:8px; }
  a { color:inherit; text-decoration:none; }
  .hit { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 13px; margin-top:10px; }
  .hit .t { font-weight:600; }
  .hit .m { color:var(--sub); font-size:13px; }
  .meta { color:var(--sub); font-size:13px; margin:14px 2px 0; }
  .empty { color:var(--sub); text-align:center; padding:24px 0; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .gc { color:var(--ink); }
  .gc img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; background:#eee; display:block; }
  .gc .t { font-size:12px; margin-top:5px; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .secttl { font-size:13px; color:var(--sub); margin:18px 2px 2px; }
  footer { color:var(--sub); font-size:12px; text-align:center; margin:20px 0; }
</style>
</head>
<body>
  <h1>中文开放书目</h1>
  <p class="sub">书名 / 作者搜索我们收录的书。作者 / 作品 / 版本三层。数据 CC0 开放。</p>

  <div class="row">
    <input id="q" type="search" placeholder="书名 / 作者，或 ISBN" autocomplete="off">
    <button id="go">搜索</button>
  </div>
  <div class="bar">
    <button id="rand" class="ghost" style="flex:1">🎲 随机一本</button>
  </div>

  <div id="meta" class="meta"></div>
  <div id="results"></div>
  <div id="discover">
    <div class="secttl">随便看看 · <a href="#" id="reshuffle" style="color:#2c5b8f">换一批</a></div>
    <div id="grid" class="grid"></div>
  </div>
  <footer>开放中文书目 · 数据 CC0 · 无需登录</footer>

<script>
const $ = s => document.querySelector(s);
const ISBN_RE = /^[0-9Xx-]{10,17}$/;
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function workCard(w) {
  const meta = [ (w.authors||[]).join("、"), w.first_publish_year ].filter(Boolean).join(" · ");
  return `<a href="/work?id=${encodeURIComponent(w.id)}"><div class="hit">
    <div class="t">${esc(w.title) || "(无标题)"}</div>
    <div class="m">${esc(meta)}</div></div></a>`;
}

async function search() {
  const q = $("#q").value.trim();
  if (!q) return;
  if (ISBN_RE.test(q) && q.replace(/[-Xx]/g,"").length >= 10) {  // 像 ISBN → 版本页
    location.href = "/book?isbn=" + encodeURIComponent(q); return;
  }
  $("#meta").textContent = "搜索中…"; $("#results").innerHTML = "";
  $("#discover").style.display = "none";        // 搜索时收起封面墙
  try {
    const d = await (await fetch("/search?" + new URLSearchParams({ q }))).json();
    if (!d.results.length) {
      $("#meta").textContent = "";
      $("#results").innerHTML = `<div class="empty">没有匹配「${esc(q)}」的书。<br>
        <a href="/add" style="color:var(--accent)">➕ 加一本书 →</a></div>`;
      return;
    }
    $("#meta").textContent = `共 ${d.total} 条`;
    $("#results").innerHTML = d.results.map(workCard).join("");
  } catch (e) { $("#meta").textContent = "搜索失败：" + e.message; }
}

async function loadStats() {
  try {
    const s = await (await fetch("/stats")).json();
    if (!$("#q").value) $("#meta").textContent = `库内 作品 ${s.works.toLocaleString()} · 版本 ${s.editions.toLocaleString()} · 作者 ${s.authors.toLocaleString()}`;
  } catch (_) {}
}
async function randomBook() {
  try {
    const r = await fetch("/random");
    if (r.ok) { const e = await r.json(); location.href = "/work?id=" + encodeURIComponent(e.work_id); }
    else $("#meta").textContent = "库里还没有书。";
  } catch (e) { $("#meta").textContent = "出错：" + e.message; }
}

async function discover() {
  try {
    const d = await (await fetch("/random_books?n=8")).json();
    $("#grid").innerHTML = d.results.map(b => `
      <a class="gc" href="/work?id=${encodeURIComponent(b.work_id)}">
        <img src="${b.cover_url}" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="t">${esc(b.title)||""}</div></a>`).join("");
  } catch (_) { $("#discover").style.display = "none"; }
}

$("#go").addEventListener("click", search);
$("#q").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
$("#rand").addEventListener("click", randomBook);
$("#reshuffle").addEventListener("click", e => { e.preventDefault(); discover(); });
loadStats();
discover();
</script>
</body>
</html>
