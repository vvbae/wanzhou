<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中文开放书目</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --accent:#c0392b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font:16px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  h1 { font-size:20px; margin:6px 0 2px; }
  .sub { color:var(--sub); font-size:13px; margin:0 0 16px; }
  .row { display:flex; gap:8px; }
  input { font:inherit; width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:9px; }
  button { font:inherit; padding:11px 15px; border:0; border-radius:9px; background:var(--ink); color:#fff; font-weight:600; }
  button.ghost { background:#fff; color:var(--ink); border:1px solid var(--line); }
  button:active { opacity:.7; }
  .bar { display:flex; gap:8px; margin-top:8px; }
  a { color:inherit; text-decoration:none; }
  .hit { display:flex; gap:12px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin-top:10px; }
  .hit img { width:44px; height:62px; object-fit:cover; border-radius:5px; background:#e7e7e3; flex:none; }
  .hit .t { font-weight:600; }
  .hit .m { color:var(--sub); font-size:13px; }
  .meta { color:var(--sub); font-size:13px; margin:14px 2px 0; }
  .empty { color:var(--sub); text-align:center; padding:24px 0; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .gc { color:var(--ink); }
  .gc img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; background:#eee; display:block; }
  .gc .t { font-size:12px; margin-top:5px; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .secttl { font-size:13px; color:var(--sub); margin:20px 2px 4px; }
  .topics { display:flex; flex-wrap:wrap; gap:8px; }
  .topics a { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:5px 13px; font-size:14px; color:var(--ink); }
  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  @media (max-width:520px){ .cards{ grid-template-columns:1fr; } }
  .navcard { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px; color:var(--ink); display:flex; flex-direction:column; gap:3px; }
  .navcard b { font-size:15px; } .navcard span { color:var(--sub); font-size:12px; }
  footer { color:var(--sub); font-size:12px; text-align:center; margin:20px 0; }
</style>
</head>
<body>
  <div style="display:flex;justify-content:space-between;align-items:baseline">
    <h1>中文开放书目</h1>
    <span id="acct" style="font-size:13px"></span>
  </div>
  <p class="sub">免费、开放的中文书目库。查一本书的作者、译者、出版社、各种版本——我们没有的，你也能添加、纠错。</p>

  <div class="row">
    <input id="q" type="search" placeholder="书名 / 作者，或 ISBN" autocomplete="off">
    <button id="go">搜索</button>
  </div>
  <div class="bar">
    <button id="rand" class="ghost" style="flex:1">🎲 随机一本</button>
  </div>

  <div id="meta" class="meta"></div>
  <div id="results"></div>
  <div id="discover">
    <div class="secttl">随便看看 · <a href="#" id="reshuffle" style="color:#2c5b8f">换一批</a></div>
    <div id="grid" class="grid"></div>
    <div class="secttl">按主题浏览</div>
    <div id="topics" class="topics"></div>
    <div class="cards">
      <a class="navcard" href="/add"><b>➕ 加一本书</b><span>我们没有的，添加进来</span></a>
      <a class="navcard" href="/guide"><b>🙋 如何参与</b><span>几分钟就能帮上忙</span></a>
      <a class="navcard" href="/about"><b>ℹ️ 关于项目</b><span>这是什么 · 数据 CC0</span></a>
    </div>
  </div>
  <footer>
    <a href="/about" style="color:var(--sub)">关于</a> ·
    <a href="/contact" style="color:var(--sub)">联系</a> ·
    <a href="/privacy" style="color:var(--sub)">隐私</a><br>
    开放中文书目 · 数据 CC0
  </footer>

<script>
const $ = s => document.querySelector(s);
const ISBN_RE = /^[0-9Xx-]{10,17}$/;
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function bookHref(b) { return b.isbn_13 ? "/book?isbn="+encodeURIComponent(b.isbn_13) : "/work?id="+encodeURIComponent(b.id); }
function gcard(b) {   // 封面网格卡片（同首页）
  const cover = b.cover_url ? `<img src="${b.cover_url}" loading="lazy" onerror="this.style.visibility='hidden'">` : `<img alt="">`;
  return `<a class="gc" href="${bookHref(b)}">${cover}<div class="t">${esc(b.title)||"(无标题)"}</div></a>`;
}

async function search(push) {
  const q = $("#q").value.trim();
  if (!q) return;
  if (ISBN_RE.test(q) && q.replace(/[-Xx]/g,"").length >= 10) {  // 像 ISBN → 版本页
    location.href = "/book?isbn=" + encodeURIComponent(q); return;
  }
  if (push !== false) history.pushState({q}, "", "?q=" + encodeURIComponent(q));  // 写进 URL，后退可恢复
  $("#meta").textContent = "搜索中…"; $("#results").innerHTML = "";
  $("#discover").style.display = "none";        // 搜索时收起封面墙
  try {
    const d = await (await fetch("/search?" + new URLSearchParams({ q }))).json();
    if (!d.results.length) {
      $("#meta").textContent = "";
      $("#results").innerHTML = `<div class="empty">没有匹配「${esc(q)}」的书。<br>
        <a href="/add" style="color:var(--accent)">➕ 加一本书 →</a></div>`;
      return;
    }
    $("#meta").textContent = `共 ${d.total} 条`;
    const authorBlock = (d.authors && d.authors.length) ? (
      `<div class="secttl">作者</div>` + d.authors.map(a => {
        const life = (a.birth_date||a.death_date) ? ` (${a.birth_date||""}–${a.death_date||""})` : "";
        return `<a href="/author?id=${encodeURIComponent(a.id)}"><div class="hit">
          <div class="t">👤 ${esc(a.name)}${esc(life)}</div>
          <div class="m">${a.work_count} 部作品</div></div></a>`;
      }).join("") + `<div class="secttl">书</div>`
    ) : "";
    $("#results").innerHTML = authorBlock + `<div class="grid">${d.results.map(gcard).join("")}</div>`;
  } catch (e) { $("#meta").textContent = "搜索失败：" + e.message; }
}

async function loadStats() {
  try {
    const s = await (await fetch("/stats")).json();
    if (!$("#q").value) $("#meta").textContent = `库内 作品 ${s.works.toLocaleString()} · 版本 ${s.editions.toLocaleString()} · 作者 ${s.authors.toLocaleString()}`;
  } catch (_) {}
}
async function randomBook() {
  try {
    const r = await fetch("/random");
    if (r.ok) { const e = await r.json(); location.href = "/work?id=" + encodeURIComponent(e.work_id); }
    else $("#meta").textContent = "库里还没有书。";
  } catch (e) { $("#meta").textContent = "出错：" + e.message; }
}

function renderGrid(items){ $("#grid").innerHTML = items.map(gcard).join(""); }
async function discover(force) {
  // 缓存到 sessionStorage：从书页返回时不再刷新成别的
  if (!force) {
    const cached = sessionStorage.getItem("cnbib_discover");
    if (cached) { renderGrid(JSON.parse(cached)); return; }
  }
  try {
    const d = await (await fetch("/random_books?n=8")).json();
    sessionStorage.setItem("cnbib_discover", JSON.stringify(d.results));
    renderGrid(d.results);
  } catch (_) { $("#discover").style.display = "none"; }
}

function route() {
  const q = new URLSearchParams(location.search).get("q");
  if (q) { $("#q").value = q; search(false); }          // 有 ?q= → 还原搜索（含后退）
  else { $("#q").value = ""; $("#results").innerHTML = ""; $("#discover").style.display = "";
         loadStats(); discover(); }                     // 无 → 首页（封面墙）
}
$("#go").addEventListener("click", () => search());
$("#q").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
$("#rand").addEventListener("click", randomBook);
$("#reshuffle").addEventListener("click", e => { e.preventDefault(); discover(true); });
async function topics() {
  try {
    const d = await (await fetch("/top_tags?n=12")).json();
    $("#topics").innerHTML = d.results.map(t =>
      `<a href="/tag?tag=${encodeURIComponent(t.slug)}&label=${encodeURIComponent(t.name)}">${esc(t.name)}</a>`).join("");
  } catch (_) {}
}
async function acct() {
  try {
    const me = await (await fetch("/auth/me")).json();
    const a = $("#acct");
    if (me.username) {
      const review = (me.role==="reviewer"||me.role==="admin") ? ` · <a href="/admin" style="color:#2c5b8f">审核</a>` : "";
      a.innerHTML = `${esc(me.username)}${review} · <a href="#" id="logout" style="color:var(--sub)">退出</a>`;
      $("#logout").onclick = async e => { e.preventDefault(); await fetch("/auth/logout",{method:"POST"}); location.reload(); };
    } else {
      a.innerHTML = `<a href="/login" style="color:#2c5b8f">登录 / 注册</a>`;
    }
  } catch(_) {}
}
window.addEventListener("popstate", route);            // 后退/前进
route();
acct();
topics();
</script>
</body>
</html>
