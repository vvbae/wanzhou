<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>作者</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --accent:#c0392b; }
  body { margin:0; font:16px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:640px; margin:0 auto; }
  a { color:#2c5b8f; text-decoration:none; }
  .nav { font-size:14px; margin-bottom:12px; }
  h1 { font-size:22px; margin:0 0 2px; }
  .orig { color:var(--sub); margin:0 0 10px; }
  .bio { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:12px; }
  h2 { font-size:15px; color:var(--sub); margin:20px 0 6px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:8px; }
  @media (max-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .gc { color:var(--ink); min-width:0; } .gc img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px; background:#e7e7e3; display:block; }
  .gc .t { font-size:12px; margin-top:5px; line-height:1.3; max-height:2.6em; overflow:hidden; }
  .gc .ph { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; background:#ececea; color:#9a9a93; font-size:12px; border-radius:8px; }
  .err { color:var(--accent); padding:24px 0; text-align:center; }
</style>
</head>
<body>
  <div class="nav"><a href="/">← 搜索</a></div>
  <div id="app"></div>
<script>
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function render(a){
  const showOrig = a.name_original && a.name_original !== a.name;
  const life = (a.birth_date || a.death_date) ? `${a.birth_date||""} – ${a.death_date||""}` : "";
  const works = (a.works||[]).map(w=>{
    const c = w.cover_url?`<img src="${w.cover_url}" loading="lazy" onerror="this.style.visibility='hidden'">`:`<div class="ph">暂无封面</div>`;
    const href = w.isbn_13?("/book?isbn="+encodeURIComponent(w.isbn_13)):("/work?id="+encodeURIComponent(w.id));
    return `<a class="gc" href="${href}">${c}<div class="t">${esc(w.title)||"(无标题)"}</div></a>`;
  }).join("");
  document.getElementById("app").innerHTML = `
    <h1>${esc(a.name)||"(无名)"}</h1>
    ${showOrig?`<p class="orig">${esc(a.name_original)}</p>`:""}
    ${life?`<p class="orig">${esc(life)}</p>`:""}
    <div class="bio">${a.bio?esc(a.bio):'<span style="color:var(--sub)">暂无简介</span>'}</div>
    ${a.last_edit?`<p class="orig" style="color:var(--sub);font-size:13px">最后由 ${esc(a.last_edit.by)} 编辑 · ${a.last_edit.at}</p>`:""}
    <h2>作品（${(a.works||[]).length}）</h2>
    ${works ? `<div class="grid">${works}</div>` : '<div style="color:var(--sub)">—</div>'}
    <p style="margin-top:16px"><a href="/edit?type=author&id=${encodeURIComponent(a.id)}">✏️ 补全 / 纠错这个作者</a></p>`;
}
async function load(){
  const id = new URLSearchParams(location.search).get("id");
  if(!id){ document.getElementById("app").innerHTML='<div class="err">缺少作者 id</div>'; return; }
  try{
    const r = await fetch("/authors?id="+encodeURIComponent(id));
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    render(await r.json());
  }catch(e){ document.getElementById("app").innerHTML=`<div class="err">加载失败：${e.message}</div>`; }
}
load();
</script>
<script src="/static/chrome.js"></script>
</body>
</html>
