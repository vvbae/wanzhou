<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>审核台</title>
<style>
  :root { --bg:#f6f6f4; --card:#fff; --line:#e3e3df; --ink:#1c1c1a; --sub:#6b6b66; --ok:#2e7d32; --accent:#c0392b; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); padding:16px; max-width:760px; margin:0 auto; }
  a{color:#2c5b8f} .nav{font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between}
  h1{font-size:19px}
  .c{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:12px}
  .c .h{font-size:13px;color:var(--sub);margin-bottom:8px}
  .c .ttl{font-weight:600;margin-bottom:8px}
  table{width:100%;border-collapse:collapse} td{padding:5px 8px;border-top:1px solid var(--line);vertical-align:top;font-size:14px}
  td.k{color:var(--sub);width:84px;white-space:nowrap} .old{color:var(--accent);text-decoration:line-through} .new{color:var(--ok)}
  .acts{display:flex;gap:8px;margin-top:10px}
  button{padding:8px 14px;border:0;border-radius:8px;font:inherit;font-weight:600;color:#fff}
  button.ok{background:var(--ok)} button.no{background:var(--accent)}
  .meta{color:var(--sub);font-size:13px;margin:12px 2px}
</style>
</head>
<body>
  <div class="nav"><a href="/">← 首页</a><span id="who"></span></div>
  <h1>审核台</h1>
  <div id="meta" class="meta"></div>
  <div id="list"></div>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const disp=v=>Array.isArray(v)?v.join("、"):(v==null?"":String(v));
const TYPE={book:"新书",work:"作品",edition:"版本",author:"作者"};

async function entityOf(t,id){           // 取目标当前数据，用于显示旧值 + 名称
  try{
    if(t==="edition") return await (await fetch("/books/"+encodeURIComponent(id))).json();
    if(t==="author")  return await (await fetch("/authors?id="+encodeURIComponent(id))).json();
    if(t==="work")    return await (await fetch("/works?id="+encodeURIComponent(id))).json();
  }catch(_){}
  return null;
}
function nameOf(t,e){ if(!e)return ""; return e.display_title||e.title||e.name||""; }

async function card(c){
  let head, rows;
  if(c.kind==="add"){
    head = `新增书：<b>${esc(c.payload.title||"")}</b>`;
    rows = Object.entries(c.payload).map(([k,v])=>`<tr><td class="k">${esc(k)}</td><td class="new">${esc(disp(v))}</td></tr>`).join("");
  }else{
    const e=await entityOf(c.target_type,c.target_id);
    head = `修改${TYPE[c.target_type]||c.target_type}：<b>${esc(nameOf(c.target_type,e))}</b>`;
    rows = Object.entries(c.payload).map(([k,v])=>{
      const oldv = e? disp(e[k]) : "";
      return `<tr><td class="k">${esc(k)}</td><td><span class="old">${esc(oldv)||"（空）"}</span> → <span class="new">${esc(disp(v))}</span></td></tr>`;
    }).join("");
  }
  // 外部核对：拿 ISBN 或书名去 Google Books / 豆瓣 搜，帮你判断对错
  const isbn = c.kind==="add" ? (c.payload.isbn_13||"") : (c.target_type==="edition"? c.target_id : "");
  const q = encodeURIComponent(isbn || c.payload.title || c.payload.name || "");
  const verify = q ? `<div class="h">核对：
    <a href="https://www.google.com/search?tbm=bks&q=${q}" target="_blank">Google 图书</a> ·
    <a href="https://search.douban.com/book/subject_search?search_text=${q}" target="_blank">豆瓣</a></div>` : "";
  return `<div class="c" id="c${c.id}">
    <div class="h">#${c.id} · 贡献者 ${esc(c.user_id||c.contributor_hint||"匿名")}</div>
    <div class="ttl">${head}</div>
    <table>${rows}</table>
    ${verify}
    <div class="acts"><button class="ok" onclick="act(${c.id},'approve')">通过</button>
      <button class="no" onclick="act(${c.id},'reject')">驳回</button></div></div>`;
}
async function act(id,what){
  try{
    const r=await fetch(`/admin/contributions/${id}/${what}`,{method:"POST"});
    if(r.status===403){location.href="/login?next=/admin";return;}
    if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
    const el=$("#c"+id); if(el) el.remove();
  }catch(e){alert("失败："+e.message);}
}
async function load(){
  const me=await (await fetch("/auth/me")).json();
  if(!me.role || (me.role!=="reviewer" && me.role!=="admin")){
    $("#meta").innerHTML=`需要审核员登录。<a href="/login?next=/admin">去登录 →</a>`; return;
  }
  $("#who").textContent=`${me.username}（${me.role}）`;
  const r=await fetch("/admin/contributions");
  if(r.status===403){ $("#meta").innerHTML=`<a href="/login?next=/admin">去登录 →</a>`; return; }
  const arr=await r.json();
  $("#meta").textContent=`待审 ${arr.length} 条`;
  $("#list").innerHTML = (await Promise.all(arr.map(card))).join("") || '<div class="meta">没有待审的。</div>';
}
load();
</script>
</body>
</html>
